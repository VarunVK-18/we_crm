<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>We-CRM Dashboard</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Softrate We-CRM - Advanced Client and Operations Management Dashboard" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="keywords" content="CRM, dashboard, client management, Softrate" />
    <meta name="author" content="Softrate" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <app-root></app-root>
    <script>
      document.addEventListener('input', function (e) {
        if (e.target.tagName.toLowerCase() === 'textarea') {
          e.target.style.height = 'auto';
          e.target.style.height = (e.target.scrollHeight) + 'px';
        }
      }, false);
    </script>
  </body>
</html>
