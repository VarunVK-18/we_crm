@if (confirmService.isOpen()) {
  <div class="confirm-backdrop" (click)="confirmService.handleDismiss()">
    <div class="confirm-modal" (click)="$event.stopPropagation()">
      <button class="modal-close-btn" (click)="confirmService.handleDismiss()" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <div class="confirm-icon" [class.destructive]="confirmService.options()?.isDestructive">
        @if (confirmService.options()?.isDestructive) {
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon-svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon-svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" />
          </svg>
        }
      </div>
      <div class="confirm-content">
        <h3 class="confirm-title">{{ confirmService.options()?.title }}</h3>
        <p class="confirm-message">{{ confirmService.options()?.message }}</p>
      </div>
      <div class="confirm-actions">
        @if (!confirmService.options()?.hideCancel) {
          <button class="btn-cancel" (click)="confirmService.handleCancel()">
            {{ confirmService.options()?.cancelText }}
          </button>
        }
        <button class="btn-confirm" [class.destructive]="confirmService.options()?.isDestructive" (click)="confirmService.handleConfirm()">
          {{ confirmService.options()?.confirmText }}
        </button>
      </div>
    </div>
  </div>
}
