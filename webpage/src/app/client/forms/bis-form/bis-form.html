<div class="form-layout">
  <div class="form-header">
    <div class="header-container">
      <button class="back-btn" (click)="goBack()">
        <span class="material-symbols-outlined">arrow_back</span>
        Back to Service
      </button>
      <div class="title-row">
        <h1>BIS Registration Form</h1>
      </div>
      <p class="subtitle">Please provide the required details to proceed with BIS Registration.</p>
    </div>
  </div>

  <div class="form-container">
    @if (errorMessage()) {
      <div class="error-banner">
        <span class="material-symbols-outlined">error</span>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form (ngSubmit)="submitForm()" ngNativeValidate class="bis-form">
      <section class="form-section">
        <h2>Company Details</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>Company Legal Name *</label>
            <input type="text" [(ngModel)]="companyLegalName" name="companyLegalName" required placeholder="Enter full legal name">
          </div>
          <div class="form-group">
            <label>Applicant Name *</label>
            <input type="text" [(ngModel)]="applicantName" name="applicantName" required placeholder="Enter applicant name">
          </div>
          <div class="form-group">
            <label>Email ID *</label>
            <input type="email" [(ngModel)]="email" name="email" required placeholder="Enter official email">
          </div>
          <div class="form-group">
            <label>WhatsApp Number *</label>
            <input type="tel" [(ngModel)]="whatsapp" name="whatsapp" required placeholder="Enter WhatsApp number">
          </div>
          <div class="form-group full-width">
            <label>Company Address *</label>
            <textarea [(ngModel)]="companyAddress" name="companyAddress" required rows="2" placeholder="Enter full company address"></textarea>
          </div>
          <div class="form-group full-width">
            <label>Courier Address (For Certificate) *</label>
            <textarea [(ngModel)]="courierAddress" name="courierAddress" required rows="2" placeholder="Enter full courier address"></textarea>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h2>Required Documents</h2>
        <div class="form-grid">
          <div class="form-group file-group full-width">
            <label>MSME Certificate *</label>
            <input type="file" required accept=".pdf,.png,.jpg,.jpeg" (change)="onFileSelected($event, 'msmeCertificate')">
            <small>Max size: 2MB (PDF/JPG/PNG)</small>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h2>Declaration</h2>
        <div class="form-group full-width" style="margin-top: 8px;">
          <label class="radio-label" style="align-items: flex-start;">
            <input type="checkbox" [(ngModel)]="isVerified" name="verification" required style="margin-top: 4px;">
            <span style="font-size: 14px; font-weight: normal; color: var(--text-secondary); line-height: 1.5;">
              I hereby declare that the information provided above is true and correct to the best of my knowledge and belief.
            </span>
          </label>
        </div>
      </section>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="goBack()" style="margin-right: 16px;">
          Cancel
        </button>
        <button type="submit" class="btn-primary submit-btn" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <div class="we-loader small" style="margin-right: 8px;"></div> Submitting...
          } @else {
            Submit BIS Registration
          }
        </button>
      </div>
    </form>
  </div>
</div>
