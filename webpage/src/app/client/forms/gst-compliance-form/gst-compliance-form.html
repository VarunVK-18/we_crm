<div class="form-layout">
  <div class="form-header">
    <div class="header-container">
      <button class="back-btn" (click)="goBack()">
        <span class="material-symbols-outlined">arrow_back</span>
        Back to Service
      </button>
      <div class="title-row">
        <h1>GST Compliance Form</h1>
      </div>
      <p class="subtitle">Please provide the required details to proceed with GST Compliance.</p>
    </div>
  </div>

  <div class="form-container">
    @if (errorMessage()) {
      <div class="error-banner">
        <span class="material-symbols-outlined">error</span>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form (ngSubmit)="submitForm()" ngNativeValidate class="gst-compliance-form">
      <section class="form-section">
        <h2>Required Documents</h2>
        
        <div class="form-grid">
          <div class="form-group file-group full-width">
            <label>Last 3 months Bank Statement (Current Account) *</label>
            <input type="file" required accept=".pdf,.png,.jpg,.jpeg" (change)="onFileSelected($event, 'bankStatement')">
            <small>Max size: 2MB (PDF/JPG/PNG)</small>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h2>Declaration</h2>
        <div class="form-group full-width" style="margin-top: 8px;">
          <label class="radio-label" style="align-items: flex-start;">
            <input type="checkbox" [(ngModel)]="isDeclared" name="declaration" required style="margin-top: 4px;">
            <span style="font-size: 14px; font-weight: normal; color: var(--text-secondary); line-height: 1.5;">
              I hereby declare that the information provided above is true and correct to the best of my knowledge and belief.
            </span>
          </label>
        </div>
      </section>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="goBack()" style="margin-right: 16px;">
          Cancel
        </button>
        
        <button type="button" class="action-btn" style="background-color: #6c757d; margin-right: 12px; height: 50px; border-radius: 8px; font-weight: 500; font-size: 16px; padding: 0 24px; color: white; border: none; cursor: pointer;" (click)="saveDraft()">Save as Draft</button>
        <button type="submit" class="btn-primary submit-btn" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <div class="we-loader small" style="margin-right: 8px;"></div> Submitting...
          } @else {
            Submit GST Compliance
          }
        </button>
      </div>
    </form>
  </div>
</div>
