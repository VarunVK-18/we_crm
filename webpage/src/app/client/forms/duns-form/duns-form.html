<div class="form-container">
  <div class="form-header">
    <button class="back-btn" (click)="goBack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </button>
    <h2>DUNS Registration Form</h2>
  </div>

  <p class="form-instructions">Please provide the required details for DUNS Registration.</p>

  <form (ngSubmit)="submitForm()">

    <div class="form-group">
      <label>Legal Business Name <span class="required">*</span></label>
      <input type="text" [(ngModel)]="legalBusinessName" name="legalBusinessName" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Trade Name (if any)</label>
      <input type="text" [(ngModel)]="tradeName" name="tradeName" class="form-control" />
    </div>

    <div class="form-group">
      <label>Business Type <span class="required">*</span></label>
      <select [(ngModel)]="businessType" name="businessType" class="form-control" required>
        <option value="">Select Type</option>
        <option value="Private Limited">Private Limited</option>
        <option value="LLP">LLP</option>
        <option value="Sole Proprietorship">Sole Proprietorship</option>
        <option value="Partnership">Partnership</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group" *ngIf="businessType === 'Other'">
      <label>Specify other type <span class="required">*</span></label>
      <input type="text" [(ngModel)]="businessTypeOther" name="businessTypeOther" class="form-control" />
    </div>

    <div class="form-group">
      <label>Year of Establishment <span class="required">*</span></label>
      <input type="text" [(ngModel)]="yearOfEstablishment" name="yearOfEstablishment" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Number of Employees <span class="required">*</span></label>
      <input type="number" [(ngModel)]="numberOfEmployees" name="numberOfEmployees" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Registered Address <span class="required">*</span></label>
      <textarea [(ngModel)]="registeredAddress" name="registeredAddress" class="form-control" rows="2" required></textarea>
    </div>

    <div class="form-group">
      <label>City <span class="required">*</span></label>
      <input type="text" [(ngModel)]="city" name="city" class="form-control" required />
    </div>

    <div class="form-group">
      <label>State <span class="required">*</span></label>
      <input type="text" [(ngModel)]="state" name="state" class="form-control" required />
    </div>

    <div class="form-group">
      <label>PIN Code <span class="required">*</span></label>
      <input type="text" [(ngModel)]="pinCode" name="pinCode" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Country <span class="required">*</span></label>
      <input type="text" [(ngModel)]="country" name="country" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Official Email ID <span class="required">*</span></label>
      <input type="email" [(ngModel)]="officialEmail" name="officialEmail" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Business Phone Number <span class="required">*</span></label>
      <input type="text" [(ngModel)]="businessPhone" name="businessPhone" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Website URL</label>
      <input type="text" [(ngModel)]="websiteUrl" name="websiteUrl" class="form-control" />
    </div>

    <div class="form-group">
      <label>PAN Number of the Business <span class="required">*</span></label>
      <input type="text" [(ngModel)]="panNumber" name="panNumber" class="form-control" required />
    </div>

    <div class="form-group">
      <label>GST Number</label>
      <input type="text" [(ngModel)]="gstNumber" name="gstNumber" class="form-control" />
    </div>

    <div class="form-group">
      <label>CIN / LLPIN number</label>
      <input type="text" [(ngModel)]="cinLlpinNumber" name="cinLlpinNumber" class="form-control" />
    </div>

    <div class="form-group">
      <label>Nature of Business <span class="required">*</span></label>
      <input type="text" [(ngModel)]="natureOfBusiness" name="natureOfBusiness" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Main Products / Services <span class="required">*</span></label>
      <input type="text" [(ngModel)]="mainProducts" name="mainProducts" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Annual Revenue (Approx) <span class="required">*</span></label>
      <input type="text" [(ngModel)]="annualRevenue" name="annualRevenue" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Founder / Director Name <span class="required">*</span></label>
      <input type="text" [(ngModel)]="founderName" name="founderName" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Designation <span class="required">*</span></label>
      <input type="text" [(ngModel)]="designation" name="designation" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Contact Number <span class="required">*</span></label>
      <input type="text" [(ngModel)]="contactNumber" name="contactNumber" class="form-control" required />
    </div>

    <section class="form-section">
      <h3 class="section-title">Document Uploads</h3>
      <p class="section-subtitle" style="color: #c2410c; font-weight: 600; font-size: 13px; margin-bottom: 20px;">
        Please verify the documents before uploading. (Max 2MB per file)
      </p>

      <div class="form-group file-upload-group full-width">
        <label>Incorporation Certificate <span class="required">*</span></label>
        <input type="file" (change)="onFileSelected($event, 'incorpCert')" accept=".pdf,.png,.jpg,.jpeg" required />
      </div>

      <div class="form-group file-upload-group full-width">
        <label>PAN Card of Company <span class="required">*</span></label>
        <input type="file" (change)="onFileSelected($event, 'panCard')" accept=".pdf,.png,.jpg,.jpeg" required />
      </div>

      <div class="form-group file-upload-group full-width">
        <label>Address Proof (Utility bill / Bank statement) <span class="required">*</span></label>
        <input type="file" (change)="onFileSelected($event, 'addressProof')" accept=".pdf,.png,.jpg,.jpeg" required />
      </div>
    </section>

    <section class="form-section">
      <h3 class="section-title">Declaration</h3>
      <div class="form-group full-width">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="declaration" name="declaration" required>
          <span>I confirm that the above information is accurate and authorize submission for D-U-N-S registration via Dun & Bradstreet. <span class="required">*</span></span>
        </label>
      </div>
    </section>

    <div class="form-actions">
      <button type="submit" class="btn-primary submit-btn" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Submitting...' : 'Submit Form' }}
      </button>
    </div>
  </form>
</div>
