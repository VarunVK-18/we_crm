<div class="content-wrapper">
  <div class="tool-header">
    <button class="back-btn" (click)="goBack()">
      <span class="material-symbols-outlined">arrow_back</span>
      Back to Dashboard
    </button>
  </div>

  <div class="tool-container">
    <h1 class="tool-title">GST Calculator</h1>
    <p class="tool-subtitle">Calculate Goods and Services Tax quickly with custom rates.</p>

    <div class="calc-card">
      <div class="row-inputs">
        <div class="form-group">
          <label>Amount (₹)</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined prefix-icon">currency_rupee</span>
            <input type="text" placeholder="e.g. 10,000" [value]="amount() ? (amount() | number:'1.0-2') : ''" (input)="onAmountInput($event)" />
          </div>
        </div>

        <div class="form-group">
          <label>GST Rate (%)</label>
          <div class="select-wrapper">
            <select [ngModel]="gstRate()" (ngModelChange)="gstRate.set($event)">
              <option [ngValue]="0">0%</option>
              <option [ngValue]="5">5%</option>
              <option [ngValue]="12">12%</option>
              <option [ngValue]="18">18%</option>
              <option [ngValue]="28">28%</option>
            </select>
            <span class="material-symbols-outlined dropdown-icon">expand_more</span>
          </div>
        </div>
        
        <div class="form-group">
          <label>Tax Type</label>
          <div class="select-wrapper">
            <select [ngModel]="taxType()" (ngModelChange)="taxType.set($event)">
              <option value="exclusive">Exclusive</option>
              <option value="inclusive">Inclusive</option>
            </select>
            <span class="material-symbols-outlined dropdown-icon">expand_more</span>
          </div>
        </div>
      </div>

      <div class="results-box">
        <div class="result-item">
          <span class="result-val actual-val" [style.color]="'#0f172a'">₹{{ actualAmount() | number:'1.0-2' }}</span>
          <span class="result-label" [style.color]="'#64748b'">Actual Amount</span>
        </div>
        <div class="result-operator" [style.color]="'#0f172a'">+</div>
        <div class="result-item">
          <span class="result-val gst-val" [style.color]="'#0f172a'">₹{{ gstAmount() | number:'1.0-2' }}</span>
          <span class="result-label" [style.color]="'#64748b'">GST Amount</span>
        </div>
        <div class="result-operator" [style.color]="'#0f172a'">=</div>
        <div class="result-item">
          <span class="result-val total-val" [style.color]="'#0f172a'">₹{{ totalAmount() | number:'1.0-2' }}</span>
          <span class="result-label" [style.color]="'#64748b'">Total Amount</span>
        </div>
      </div>
    </div>
  </div>
</div>
