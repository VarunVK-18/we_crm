<div class="sidebar-container">
  <div class="branding-header">
    <div class="logo-box">
      <img src="/logo.jpg" alt="Wealth Empires Logo" class="actual-brand-logo" />
    </div>
    <div class="branding-text">
      <span class="branding-title">Wealth Empires</span>
      <span class="branding-subtitle">Client Portal</span>
    </div>
  </div>
  
  <div class="navigation-list">
    <div class="group-items">
      <div class="nav-item-wrapper" routerLink="/client/dashboard" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="Home07Icon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Home</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/services" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="DashboardSquare01Icon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Services</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/ongoing-services" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="PackageIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">My Service</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/compliance" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="Shield01Icon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Compliance</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/support-tickets" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="MentoringIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Support Tickets</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/subscriptions" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="CrownIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Subscriptions</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/profile" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="UserIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Profile</span>
        </div>
      </div>


      <div class="nav-item-wrapper" routerLink="/client/support" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="CustomerSupportIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Help & Support</span>
        </div>
      </div>
    </div>
    
  </div>
  
  @if (user()) {
    <div class="sidebar-footer">
      <div class="avatar-box">
        {{ (user()?.company_name || user()?.name || 'C')[0] | uppercase }}
      </div>
      <div class="user-info">
        <div class="user-name">{{ user()?.company_name || user()?.name || 'Client' }}</div>
        <div class="user-role">Client</div>
      </div>
      <button class="btn-logout" (click)="logout()" title="Sign Out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  }
</div>
