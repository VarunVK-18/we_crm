<div class="sidebar-container">
  <div class="branding-header">
    <div class="logo-box">
      <img src="/logo.jpg" alt="Wealth Empires Logo" class="actual-brand-logo" />
    </div>
    <div class="branding-text">
      <span class="branding-title">Wealth Empires</span>
      <span class="branding-subtitle">Client Portal</span>
    </div>
  </div>
  
  <div class="navigation-list">
    <div class="group-items">
      <div class="nav-item-wrapper" routerLink="/client/dashboard" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="Home07Icon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Home</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/services" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="DashboardSquare01Icon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Services</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/ongoing-services" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="PackageIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">My Service</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/compliance" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="Shield01Icon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Compliance</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/support-tickets" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="MentoringIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Support Tickets</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/subscriptions" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="CrownIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Subscriptions</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/document-hub" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="File01Icon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Document Hub</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/profile" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="UserIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Profile</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/company-details" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="Building04Icon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Company Details</span>
        </div>
      </div>

      <div class="nav-item-wrapper" routerLink="/client/support" routerLinkActive="selected">
        <div class="nav-item-content">
          <hugeicons-icon 
            [icon]="CustomerSupportIcon" 
            [size]="18" 
            color="currentColor"
            class="nav-item-icon"
            [strokeWidth]="2.2">
          </hugeicons-icon>
          <span class="nav-item-label">Help & Support</span>
        </div>
      </div>
    </div>
    
  </div>

  <div class="trusted-companies">
    <div class="trusted-title">Trusted by Wealth Empires</div>
    <div class="trusted-slider">
      @for (company of trustedCompanies; track company.name; let idx = $index) {
        <a [href]="company.url" target="_blank" class="trusted-slide" [class.active]="currentTrustedIndex() === idx" title="Visit {{ company.name }}">
          <img [src]="company.image" [alt]="company.name" class="trusted-img">
          <div class="trusted-info">
            <span class="trusted-name">{{ company.name }}</span>
            <span class="trusted-desc">{{ company.desc }}</span>
          </div>
        </a>
      }
    </div>
  </div>
</div>
