<div class="tab-view fade-in">
  <div class="filter-action-bar">
    <h2 class="section-title-premium" style="font-size: var(--text-2xl); font-weight: 700; color: var(--text-primary);">Company System Settings</h2>
  </div>

  <div class="client-profile-card" style="max-width: 600px; margin-top: 16px; padding: 24px;">
    <form (ngSubmit)="saveSettings()" style="display: flex; flex-direction: column; gap: 20px;">
      <!-- Fee setting -->
      <div class="form-group-item">
        <label class="form-input-label" style="font-weight: 600; color: var(--text-primary);">Default Company Incorporation Fee (INR) *</label>
        <input type="number" 
               [(ngModel)]="settings().incorporation_fee" 
               name="incorporation_fee" 
               [disabled]="user()?.role !== 'admin'"
               class="form-control-input" 
               required />
      </div>

      <!-- Tax percentage -->
      <div class="form-group-item">
        <label class="form-input-label" style="font-weight: 600; color: var(--text-primary);">Filing Tax Percentage (%) *</label>
        <input type="number" 
               [(ngModel)]="settings().default_filing_tax" 
               name="default_filing_tax" 
               [disabled]="user()?.role !== 'admin'"
               class="form-control-input" 
               required />
      </div>

      <!-- Allow Agent registration checkbox -->
      <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
        <input type="checkbox" 
               id="allow_agent" 
               [(ngModel)]="settings().allow_agent_registration" 
               name="allow_agent_registration" 
               [disabled]="user()?.role !== 'admin'"
               style="width: 18px; height: 18px; cursor: pointer;" />
        <label for="allow_agent" style="font-size: 14px; font-weight: 500; color: var(--text-primary); cursor: pointer;">
          Allow Agents to register clients directly
        </label>
      </div>

      <!-- Require Verification checkbox -->
      <div style="display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" 
               id="require_verify" 
               [(ngModel)]="settings().require_document_verification" 
               name="require_document_verification" 
               [disabled]="user()?.role !== 'admin'"
               style="width: 18px; height: 18px; cursor: pointer;" />
        <label for="require_verify" style="font-size: 14px; font-weight: 500; color: var(--text-primary); cursor: pointer;">
          Force mandatory document verification before final approval
        </label>
      </div>

      <!-- Submit button (Admins only) -->
      @if (user()?.role === 'admin') {
        <div style="margin-top: 10px;">
          <button type="submit" class="btn-submit" style="width: 100%; padding: 12px; font-weight: bold; background-color: var(--accent-primary); border-radius: 8px;">
            Save System Settings
          </button>
        </div>
      } @else {
        <div style="padding: 10px; border-radius: 8px; background-color: rgba(245, 158, 11, 0.15); border: 1px solid #F59E0B; font-size: 13px; color: #F59E0B;">
          <strong>Note:</strong> You have view-only access to company configurations. Only Administrator roles can modify settings.
        </div>
      }
    </form>
  </div>
</div>
