<div class="tab-view fade-in">
  <!-- Glass welcome banner -->
  <div class="welcome-banner">
    <div class="banner-content">
      <h2 class="banner-heading">
        {{ getGreeting() }},<br>
        <span class="user-name">{{ user()?.owner_name || 'Admin' }}</span>
      </h2>
      <p class="banner-subtext">Track company filings, compliance reminders, and service checklists for {{ getCompanyName() || 'Wealth Empires' }} from one place.</p>
    </div>
    <div class="banner-decorations">
      <div class="circle-center">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
      </div>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    @for (stat of stats; track stat.title) {
      <div class="stat-card">
        <div class="stat-title">{{ stat.title }}</div>
        <div class="stat-value" [class.warning]="stat.isWarning">{{ stat.value }}</div>
        <div class="stat-detail" [class.up]="stat.isTrendUp" [class.warning-text]="stat.isWarning" [class.good-text]="stat.isGood">
          {{ stat.detail }}
        </div>
      </div>
    }
  </div>
</div>
